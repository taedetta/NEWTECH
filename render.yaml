services:
  - type: web
    name: newtech-aviation
    runtime: node
    plan: free
    region: virginia
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://www.newtechaviation.com
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATA_BACKUP_EMAIL
        value: aviationnewtech@gmail.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
