<head>

  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0F1D2F">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #0F1D2F 0%, #1a2744 45%, #0F1D2F 100%);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .stars-bg {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.35) 0, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.25) 0, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,.3) 0, transparent 100%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.2) 0, transparent 100%);
      pointer-events: none;
      opacity: .6;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      animation: fadeUp .9s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes wave {
      0%, 100% { transform: rotate(-1deg) scale(1); }
      50% { transform: rotate(1deg) scale(1.02); }
    }

    .flag-wrap {
      margin: 0 auto 2rem;
      width: min(92vw, 520px);
      filter: drop-shadow(0 20px 40px rgba(0,0,0,.45));
      animation: wave 4s ease-in-out infinite;
    }

    .flag {
      width: 100%;
      aspect-ratio: 10 / 5.3;
      border-radius: 6px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.15);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.2);
    }

    .logo {
      height: 56px;
      margin-bottom: 1.5rem;
      opacity: .95;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 4.25rem);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: .75rem;
      background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #94a3b8;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: #cbd5e1;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    .stripes {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .stripe { flex: 1; }
    .stripe.red { background: #B22234; }
    .stripe.white { background: #fff; }

    .canton {
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 54%;
      background: #3C3B6E;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
      padding: 4% 3%;
    }

    .star {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: clamp(6px, 1.4vw, 11px);
      line-height: 1;
    }

    .flag-inner {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .stripes-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="stars-bg" aria-hidden="true"></div>

            <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
          </div>
          <div class="stripes-wrap">

            <div class="stripe white"></div>
            <div class="stripe red"></div>
            <div class="stripe white"></div>
            <div class="stripe red"></div>
            <div class="stripe white"></div>

  </div>
